<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A4A6A"/>
      <stop offset="100%" stop-color="#091820"/>
    </linearGradient>
    <!-- userSpaceOnUse so gradient works correctly on stroked lines -->
    <linearGradient id="gold" x1="16" y1="5.5" x2="16" y2="23.5" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#F5D070"/>
      <stop offset="100%" stop-color="#C8883A"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>

  <!-- Outer border -->
  <rect x="0.8" y="0.8" width="30.4" height="30.4" rx="6.4"
        fill="none" stroke="#E8A84C" stroke-width="0.5" opacity="0.3"/>

  <!-- Halo ring -->
  <circle cx="16" cy="14.5" r="8.8"
          fill="none" stroke="#E8A84C" stroke-width="0.65" opacity="0.55"/>

  <!-- Cross — vertical -->
  <line x1="16" y1="5.5" x2="16" y2="23.5"
        stroke="url(#gold)" stroke-width="3.2" stroke-linecap="round"/>

  <!-- Cross — horizontal -->
  <line x1="8" y1="13.5" x2="24" y2="13.5"
        stroke="url(#gold)" stroke-width="3.2" stroke-linecap="round"/>

  <!-- Double wave -->
  <path d="M5.5 26.2 C8.5 24.4 10.5 26.4 13.5 25.4 C16 24.6 17.5 26.4 20.5 25.4 C22.5 24.6 24.5 26.2 27 25.4"
        stroke="#7DC4E0" stroke-width="1.2" fill="none" stroke-linecap="round" opacity="0.7"/>
  <path d="M6.5 28 C9 26.4 11 28 13.5 27.2 C16 26.4 17.5 28 20.5 27.2 C22.5 26.4 24 27.8 26.5 27.2"
        stroke="#5AA0C8" stroke-width="0.85" fill="none" stroke-linecap="round" opacity="0.45"/>
</svg>
